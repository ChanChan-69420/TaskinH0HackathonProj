<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer circle border with glow -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#1dd9d0" stroke-width="3" filter="url(#glow)" opacity="0.8"/>
  
  <!-- T shape -->
  <g fill="#1dd9d0" filter="url(#glow)">
    <!-- Top horizontal bar of T -->
    <rect x="30" y="20" width="40" height="8"/>
    <!-- Vertical bar of T -->
    <rect x="44" y="28" width="12" height="42"/>
  </g>
</svg>
